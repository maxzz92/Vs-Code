<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        .display {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }

        .display input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 2.5em;
            font-weight: 300;
            color: #333;
            outline: none;
            text-align: right;
        }

        .result {
            font-size: 1.2em;
            color: #667eea;
            min-height: 30px;
            margin-top: 10px;
            text-align: right;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0f0f0;
            color: #333;
        }

        button:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.operator {
            background: #667eea;
            color: white;
        }

        button.operator:hover {
            background: #5568d3;
        }

        button.equals {
            background: #48bb78;
            color: white;
            grid-column: span 2;
        }

        button.equals:hover {
            background: #38a169;
        }

        button.clear {
            background: #f56565;
            color: white;
            grid-column: span 2;
        }

        button.clear:hover {
            background: #e53e3e;
        }

        .error {
            color: #f56565;
        }

        .success {
            color: #48bb78;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <input type="text" id="display" placeholder="0" readonly>
            <div class="result" id="result"></div>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">Clear</button>
            <button class="operator" onclick="appendOperator('/')">&divide;</button>
            <button class="operator" onclick="appendOperator('*')">&times;</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="toggleNegative()">+/-</button>
            
            <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let resultDiv = document.getElementById('result');

        function appendNumber(num) {
            if (display.value === '0' && num !== '.') {
                display.value = num;
            } else if (num === '.' && display.value.includes('.')) {
                return;
            } else {
                display.value += num;
            }
            resultDiv.textContent = '';
        }

        function appendOperator(op) {
            if (display.value === '') return;
            if (['+', '-', '*', '/'].includes(display.value.slice(-1))) {
                display.value = display.value.slice(0, -1) + op;
            } else {
                display.value += op;
            }
            resultDiv.textContent = '';
        }

        function toggleNegative() {
            if (display.value === '' || display.value === '0') return;
            if (display.value.startsWith('-')) {
                display.value = display.value.substring(1);
            } else {
                display.value = '-' + display.value;
            }
        }

        function clearDisplay() {
            display.value = '0';
            resultDiv.textContent = '';
        }

        async function calculate() {
            const expression = display.value;
            if (expression === '' || expression === '0') return;

            try {
                const response = await fetch('/api/calc', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ expression: expression })
                });

                const data = await response.json();

                if (data.error) {
                    resultDiv.textContent = 'Error: ' + data.error;
                    resultDiv.className = 'result error';
                } else {
                    display.value = data.result;
                    resultDiv.textContent = '✓ Calculated';
                    resultDiv.className = 'result success';
                }
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                resultDiv.className = 'result error';
            }
        }

        // Allow Enter key for calculation
        display.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                calculate();
            }
        });

        // Initialize display
        clearDisplay();
    </script>
</body>
</html>
